spring:
  application:
    name: suspectra-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/suspectra_db}
    username: ${DB_USERNAME:suspectra_user}
    password: ${DB_PASSWORD:suspectra_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBzdXNwZWN0cmEgMjAyNQ==}
    expiration: ${JWT_EXPIRATION:86400000}

  otp:
    expiry-minutes: ${OTP_EXPIRY_MINUTES:10}
    dev-mode: ${OTP_DEV_MODE:true}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
